<!Doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Colombine — Carretera Perdida</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.x.x/dist/aframe-event-set-component.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.7.0/dist/aframe-extras.min.js"></script>

  <!-- ══ COMPONENTES — ANTES DE <a-scene> ══ -->
  <script>
    var JOY_R     = 37;
    var SPEED     = 0.250;
    var joyActive = false;
    var joyDx = 0, joyDy = 0;
    var vertDir = 0; /* -1 bajar, 0 quieto, +1 subir */

    AFRAME.registerComponent('mobile-movement', {
      tick: function () {
        var nx = joyDx / JOY_R;
        var ny = joyDy / JOY_R;
        var moving = joyActive && (Math.abs(nx) > 0.05 || Math.abs(ny) > 0.05);

        var camEl = this.el.querySelector('[camera]');
        if (!camEl) return;

        if (moving) {
          var euler = new THREE.Euler();
          euler.setFromQuaternion(
            camEl.object3D.getWorldQuaternion(new THREE.Quaternion()), 'YXZ'
          );
          var angle = euler.y;
          var sinA  = Math.sin(angle);
          var cosA  = Math.cos(angle);
          var pos = this.el.object3D.position;
          pos.x += sinA * (-ny) * SPEED;
          pos.z += cosA * (-ny) * SPEED;
          pos.x += cosA * nx * SPEED;
          pos.z += (-sinA) * nx * SPEED;
        }

        if (vertDir !== 0) {
          camEl.object3D.position.y += vertDir * SPEED;
        }
      }
    });
  </script>

  <style>
    #vert-btns {
      position: fixed; bottom: 28px; right: 108px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 9999;
    }
    .vert-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.5);
      color: #fff; font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; user-select: none; cursor: pointer;
    }
    .vert-btn:active { background: rgba(255,255,255,0.35); }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; }

    #joy-zone {
      position: fixed; bottom: 28px; left: 20px;
      width: 120px; height: 120px;
      z-index: 9999; touch-action: none;
    }
    .joy-base {
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,0.13);
      border: 2px solid rgba(255,255,255,0.4);
      position: relative;
    }
    .joy-thumb {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.55);
      border: 2px solid rgba(255,255,255,0.9);
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
    }

    #btn-portal {
      position: fixed; bottom: 28px; right: 20px;
      width: 76px; height: 76px; border-radius: 50%;
      background: rgba(240,230,140,0.25);
      border: 2px solid rgba(240,230,140,0.9);
      color: #fff; font-family: sans-serif;
      font-size: 11px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      text-align: center; line-height: 1.3;
      z-index: 9999; touch-action: manipulation; user-select: none;
    }
    #btn-portal:active { background: rgba(240,230,140,0.55); }

    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 9998;
    }

    #toast {
      position: fixed; bottom: 160px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #fff;
      font-family: sans-serif; font-size: 14px;
      padding: 8px 18px; border-radius: 20px;
      z-index: 9999; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- BOTONES SUBIR / BAJAR -->
  <div id="vert-btns">
    <div class="vert-btn" id="btn-up">▲</div>
    <div class="vert-btn" id="btn-down">▼</div>
  </div>

  <!-- JOYSTICK -->
  <div id="joy-zone">
    <div class="joy-base" id="joy-base">
      <div class="joy-thumb" id="joy-thumb"></div>
    </div>
  </div>

  <!-- BOTÓN PORTAL -->
  <div id="btn-portal">SALIR<br>PORTAL</div>

  <!-- CROSSHAIR -->
  <div id="crosshair">
    <svg width="34" height="34" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r="13" fill="none" stroke="white" stroke-width="1.5" opacity="0.75"/>
      <line x1="17" y1="4"  x2="17" y2="11" stroke="white" stroke-width="1.5" opacity="0.75"/>
      <line x1="17" y1="23" x2="17" y2="30" stroke="white" stroke-width="1.5" opacity="0.75"/>
      <line x1="4"  y1="17" x2="11" y2="17" stroke="white" stroke-width="1.5" opacity="0.75"/>
      <line x1="23" y1="17" x2="30" y2="17" stroke="white" stroke-width="1.5" opacity="0.75"/>
      <circle cx="17" cy="17" r="2" fill="white" opacity="0.9"/>
    </svg>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- AUDIO: canción que arranca tras el sonido de la máquina expendedora -->
  <audio id="sitDownSong" src="Sit Down. Stand Up(MP3_160K).mp3" preload="auto"></audio>

  <!-- ══════════ ESCENA A-FRAME ══════════ -->
  <a-scene vr-mode-ui="enabled: true"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.7/"
    renderer="antialias: false; colorManagement: true; physicallyCorrectLights: false; maxCanvasWidth: 1600; maxCanvasHeight: 1600">

    <!-- ── MODELOS INTERACTIVOS (con texto emergente al mirar) ── -->
    <a-gltf-model id="maquinaExpendedora" class="clickable"
      src="7286875bc78e4ef496b64831b2348f31.glb" scale="1 1 1" position="-5 0 -5"
      sound="on: mouseenter; src: freesound_community-room-with-buzz-incandescent-light-bulb-23892.mp3; volume: 50"
      event-set__enter="_event: mouseenter; _target: #boxText; visible: true"
      event-set__leave="_event: mouseleave; _target: #boxText; visible: false">
    </a-gltf-model>

    <a-gltf-model id="senal1" class="clickable" src="4349861a89594fb8923aebe3479420ec.glb" position="28.61811 -0.00967 -60.20071" rotation="0 -50 0"
      event-set__enter="_event: mouseenter; _target: #boxText-1; visible: true"
      event-set__leave="_event: mouseleave; _target: #boxText-1; visible: false"></a-gltf-model>

    <a-gltf-model id="senal2" class="clickable" src="4349861a89594fb8923aebe3479420ec.glb" position="26.90633 0.0453 -62.30645" rotation="0 -60 0"
      event-set__enter="_event: mouseenter; _target: #boxText-2; visible: true"
      event-set__leave="_event: mouseleave; _target: #boxText-2; visible: false"></a-gltf-model>

    <a-gltf-model id="senal3" class="clickable" src="4349861a89594fb8923aebe3479420ec.glb" position="25.73594 0.0453 -64.55948" rotation="0 -60 0"
      event-set__enter="_event: mouseenter; _target: #boxText-3; visible: true"
      event-set__leave="_event: mouseleave; _target: #boxText-3; visible: false"></a-gltf-model>

    <a-text id="boxText" value="It's an abandoned vending machine." align="center" color="#FFF" position="-4.44162 2.7696 -5.05318" geometry="primitive: plane; width: 3" material="color: #333" rotation="0 90 0" visible="false"></a-text>
    <a-text id="boxText-1" value="DANGER! STAY AWAY!" align="center" color="#FFF" position="28.33448 1.90655 -59.94273" geometry="primitive: plane; width: 3" material="color: #333" rotation="0 130 0" visible="false"></a-text>
    <a-text id="boxText-2" value="DANGER! STAY AWAY!" align="center" color="#FFF" position="26.74534 2.6601 -62.68323" geometry="primitive: plane; width: 3" material="color: #333" rotation="0 130 0" visible="false"></a-text>
    <a-text id="boxText-3" value="DANGER! STAY AWAY!" align="center" color="#FFF" position="26.30163 1.93453 -65.36191" geometry="primitive: plane; width: 3" material="color: #333" rotation="0 130 0" visible="false"></a-text>

    <!-- ── PROPS DECORATIVOS ── -->
    <a-gltf-model src="9b66b3aea2cf42dfadb35fb44f5cf3e4.glb"></a-gltf-model>
    <a-gltf-model src="b4df86f1e6374bed90997ec6b339887a.glb" scale="0.5 0.5 0.5" position="-0.98379 0.10099 -7.48522" rotation="10 0 10"></a-gltf-model>

    <a-plane src="suelo.jpg" position="-5 0.1 -5" rotation="-90 0 0" width="5" height="5" color="#7BC8A4"></a-plane>
    <a-sky src="cielo.jpg" color="#ECECEC"></a-sky>

    <!-- ── ILUMINACIÓN ── -->
    <a-light type="ambient" color="#5B27F5"></a-light>
    <a-light type="point" position="-4.20478 1.51209 -4.82557" intensity="5"></a-light>
    <a-light type="point" position="-3.71273 1.60412 -4.92978" intensity="5" light="color: #ff0000"></a-light>

    <a-light type="point" position="0.80876 5.58994 -9.03775"     intensity="5" light="color: #ffca82; distance: 18; intensity: 80; castShadow: true"></a-light>
    <a-light type="point" position="-6.14969 5.83411 10.44772"    intensity="5" light="color: #ffca82; distance: 18; intensity: 80; castShadow: true"></a-light>
    <a-light type="point" position="-25.99433 5.80876 45.06285"   intensity="5" light="color: #ffca82; distance: 18; intensity: 80"></a-light>

    <!-- ── ELEMENTOS ANIMADOS ── -->
    <a-entity gltf-model="f13f73463dfb40f8a429c2f4b60c563f.glb" animation-mixer="" position="-5.58432 1.03715 9.02051"  rotation="80 0 0"></a-entity>
    <a-entity gltf-model="f13f73463dfb40f8a429c2f4b60c563f.glb" animation-mixer="" position="-1.45037 1.03715 4.66796" rotation="0 80 80"></a-entity>
    <a-entity gltf-model="f13f73463dfb40f8a429c2f4b60c563f.glb" animation-mixer="" position="-1.0783 1.69295 11.42761" rotation="180 59 0"></a-entity>

    <!-- ── PORTAL DE SALIDA — vuelve al hub (World 1) ── -->
  <a-link id="portalSalida" 
    on="portal-manual-only" 
    href="https://carlatienzam-byte.github.io/EPE-IES-Carmen-de-Burgos-Segui/" 
    title="Backrooms"
    image="backrooms.jpg"
    position="20.84891 1.6 -1.37972" 
    geometry="primitive: circle; segments: 64" 
    material="shader: portal; side: double" 
    rotation="0 -86.21385315905319 0" 
    class="portal" data-url="https://carlatienzam-byte.github.io/EPE-IES-Carmen-de-Burgos-Segui/">
      <a-entity text="align: center; color: white; font: kelsonsans; value: Hub; width: 5" 
        position="0 1.5 0" 
        rotation="0 180 0"></a-entity>
    <a-entity text="align: center; color: white; font: kelsonsans; value: Volver al Hub; width: 5" 
      position="0 1.5 0" rotation="0 180 0"></a-entity>
    <a-entity 
      geometry="primitive: sphere; phiLength: 180; thetaLength: 360; segmentsHeight: 64; segmentsWidth: 64" 
      material="shader: portal; side: back; borderEnabled: 0" 
      rotation="0 180 0" 
      visible="false"></a-entity>
    <a-entity 
      geometry="primitive: sphere; radius: 10; segmentsHeight: 64; segmentsWidth: 64" 
      material="shader: portal; side: back; borderEnabled: 0" 
      visible="false"></a-entity>
  </a-link>

    <!-- ── CÁMARA / RIG ── -->
    <a-entity id="rig" position="0 0 0" mobile-movement>
      <a-camera id="camera"
        position="0 1.6 0"
        camera="userHeight: 0"
        look-controls="touchEnabled: true; magicWindowTrackingEnabled: false; pointerLockEnabled: false; reverseTouchDrag: true"
        wasd-controls="enabled: false">
        <a-cursor color="#fff" fuse="false" raycaster="objects: .clickable; far: 15"></a-cursor>
      </a-camera>
    </a-entity>

  </a-scene>

  <script>
    /* ── BOTONES SUBIR / BAJAR ── */
    ['up','down'].forEach(function(dir) {
      var btn = document.getElementById('btn-' + dir);
      var val = dir === 'up' ? 1 : -1;
      btn.addEventListener('touchstart', function(e) { e.preventDefault(); vertDir = val; }, { passive: false });
      btn.addEventListener('touchend',   function(e) { e.preventDefault(); vertDir = 0;   }, { passive: false });
      btn.addEventListener('mousedown',  function()  { vertDir = val; });
      btn.addEventListener('mouseup',    function()  { vertDir = 0; });
    });

    /* ── JOYSTICK ── */
    var joyBase  = document.getElementById('joy-base');
    var joyThumb = document.getElementById('joy-thumb');

    function joyPos(touch) {
      var r = joyBase.getBoundingClientRect();
      return {
        x: touch.clientX - r.left - r.width  / 2,
        y: touch.clientY - r.top  - r.height / 2
      };
    }

    joyBase.addEventListener('touchstart', function(e) {
      e.preventDefault(); joyActive = true;
    }, { passive: false });

    joyBase.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (!joyActive) return;
      var p = joyPos(e.touches[0]);
      var d = Math.sqrt(p.x*p.x + p.y*p.y);
      var c = d > JOY_R ? JOY_R / d : 1;
      joyDx =  p.x * c;
      joyDy = -p.y * c;
      joyThumb.style.transform =
        'translate(calc(-50% + '+joyDx+'px), calc(-50% + '+(-joyDy)+'px))';
    }, { passive: false });

    joyBase.addEventListener('touchend', function(e) {
      e.preventDefault();
      joyActive = false; joyDx = 0; joyDy = 0;
      joyThumb.style.transform = 'translate(-50%,-50%)';
    }, { passive: false });

    /* ── TOAST ── */
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._tid);
      t._tid = setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }

    /* ── PORTAL por raycaster central ── */
    function getPortalAtCenter() {
      var camEl = document.getElementById('camera');
      if (!camEl) return null;
      var cam = camEl.getObject3D('camera');
      if (!cam) return null;
      var rc = new THREE.Raycaster();
      rc.setFromCamera(new THREE.Vector2(0,0), cam);
      var meshes = [];
      document.querySelectorAll('.portal').forEach(function(el) {
        el.object3D.traverse(function(o){ if (o.isMesh) meshes.push(o); });
      });
      var hits = rc.intersectObjects(meshes, true);
      if (!hits.length) return null;
      var obj = hits[0].object;
      for (var i = 0; i < 8; i++) {
        if (obj.el && obj.el.dataset && obj.el.dataset.url) return obj.el;
        if (!obj.parent) break;
        obj = obj.parent;
      }
      return null;
    }

    function activatePortal(el) {
      if (!el) { showToast('Apunta a un portal'); return; }
      showToast('Entrando: ' + (el.getAttribute('title') || 'Portal'));
      setTimeout(function(){ window.location.href = el.dataset.url; }, 600);
    }

    /* ── BOTÓN PORTAL ── */
    var btnPortal = document.getElementById('btn-portal');
    btnPortal.addEventListener('touchstart', function(e) {
      e.preventDefault(); activatePortal(getPortalAtCenter());
    }, { passive: false });
    btnPortal.addEventListener('click', function() {
      activatePortal(getPortalAtCenter());
    });

    /* ── CLICK EN PORTALES: BLOQUEADO A PROPÓSITO ──
       Solo se puede entrar a un portal pulsando el botón "SALIR PORTAL". */
    document.querySelectorAll('.portal').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }, true);
    });

    /* ── MÁQUINA EXPENDEDORA → ACTIVA/DESACTIVA "SIT DOWN. STAND UP" CON CLICK ── */
    var maquinaExpendedora = document.getElementById('maquinaExpendedora');
    var sitDownSong = document.getElementById('sitDownSong');

    maquinaExpendedora.addEventListener('click', function () {
      if (sitDownSong.paused) {
        sitDownSong.play().catch(function (err) {
          console.warn('No se pudo reproducir "Sit Down. Stand Up":', err);
        });
      } else {
        sitDownSong.pause();
      }
    });

    /* ── DESBLOQUEO DE AUDIO EN MÓVIL ── */
    var audioUnlocked = false;
    function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;
      var ctx = THREE.AudioContext ? THREE.AudioContext.getContext() : null;
      if (ctx && ctx.state === 'suspended') ctx.resume();
    }
    document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
    document.addEventListener('click',      unlockAudio, { once: true });
  </script>

</body>
</html>
